name: AstraLand-PvpFactions
version: 1.0.0-SNAPSHOT
main: com.astraland.pvpfactions.PvpFactions
api-version: "1.21"
description: AstraLand - Module PvP/Factions
authors: [AstraLand]

commands:
  faction:
    description: Commandes de factions
    aliases: [f, factions]
    usage: /faction <create|join|leave|invite|kick|info|list|top|claim|unclaim|unclaimall|sethome|home|ally|enemy|neutral|promote|demote|disband|chat|map|power|who|stuck|open|tag|desc|motd|autoclaim|setwarp|warp|warps|delwarp|setowner|announce|coords>
  kills:
    description: Voir ses statistiques PvP
    aliases: [stats, kd]
    usage: /kills [joueur]
  topkills:
    description: Classement des kills
    aliases: [killstop, topk]
    usage: /topkills [kills|streak]
  killstreak:
    description: Voir sa série de kills
    aliases: [streak, ks]
    usage: /killstreak [joueur]
  bounty:
    description: Gérer les primes
    usage: /bounty <joueur> <montant> | list | info <joueur>
  bountylist:
    description: Liste des primes actives
    aliases: [primes]
    usage: /bountylist
  kit:
    description: Obtenir un kit
    usage: /kit [nom]
  balance:
    description: Voir son solde de pièces
    aliases: [bal, money]
    usage: /balance [joueur]
  pay:
    description: Envoyer des pièces à un joueur
    usage: /pay <joueur> <montant>
  shop:
    description: Ouvre le shop du mode de jeu
    usage: /shop
  ah:
    description: Hôtel des ventes
    aliases: [auction, bazaar]
    usage: /ah | /ah sell
  sell:
    description: Vendre des items du shop
    aliases: [sellall, vendre]
    usage: /sell all
  givemoney:
    description: Donner de l'argent à un joueur (admin)
    aliases: [addmoney, eco-give]
    usage: /givemoney <joueur> <montant>
    permission: astraland.admin
    permission-message: "&cTu n'as pas la permission d'utiliser cette commande."
    default: op
