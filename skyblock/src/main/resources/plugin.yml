name: AstraLand-Skyblock
version: 1.0.0-SNAPSHOT
main: com.astraland.skyblock.Skyblock
api-version: "1.21"
description: AstraLand - Module Skyblock
authors: [AstraLand]

commands:
  island:
    description: Commandes Skyblock
    aliases: [is, sb, skyblock]
    usage: /island <sous-commande>
  balance:
    description: Voir son solde de pièces
    aliases: [bal, money]
    usage: /balance [joueur]
  baltop:
    description: Classement des joueurs les plus riches
    aliases: [richlist, topbal]
    usage: /baltop
  pay:
    description: Envoyer des pièces à un joueur
    usage: /pay <joueur> <montant>
  shop:
    description: Ouvre le shop du mode de jeu
    usage: /shop
  ah:
    description: Hôtel des ventes
    aliases: [auction, bazaar]
    usage: /ah [sell <prix>|me|claimed]
  sell:
    description: Vendre des items
    aliases: [sellall]
    usage: /sell <all|hand>
  isadmin:
    description: Administration des îles Skyblock
    aliases: [sbadmin, islandadmin]
    usage: /isadmin <sous-commande> [joueur] [valeur]
    permission: astraland.admin
    default: op
  givemoney:
    description: Donner de l'argent à un joueur (admin)
    aliases: [addmoney, eco-give]
    usage: /givemoney <joueur> <montant>
    permission: astraland.admin
    permission-message: "&cTu n'as pas la permission d'utiliser cette commande."
    default: op

permissions:
  astraland.skyblock.admin:
    description: Bypass la protection des îles
    default: op
  astraland.admin:
    description: Commandes d'administration Skyblock
    default: op
