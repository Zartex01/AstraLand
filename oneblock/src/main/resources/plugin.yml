name: AstraLand-OneBlock
version: 1.0.0-SNAPSHOT
main: com.astraland.oneblock.OneBlock
api-version: "1.21"
description: AstraLand - Module OneBlock complet
authors: [AstraLand]

commands:
  oneblock:
    description: Commandes OneBlock
    aliases: [ob, one]
    usage: /ob [create|home|info|top|invite|kick|accept|decline|leave|coowner|delete|warp|setwarp|motd|ic|members|upgrades|defis|missions|weekly|skills|bank|prestige|boost|collections|achievements|vault|stats|playerstats|sellall|worth|help]
  obadmin:
    description: Commandes admin OneBlock
    aliases: [oneblockadmin]
    usage: /obadmin [info|tp|setblocks|reset|give|list|reload|boost]
    permission: astraland.admin
    default: op
  ic:
    description: Chat d'île
    aliases: [islandchat, teamchat]
    usage: /ic <message>
  sellall:
    description: Vendre tout l'inventaire au prix du shop
    aliases: [sa, vendretout]
    usage: /sellall
  balance:
    description: Voir son solde
    aliases: [bal, money, coins]
    usage: /balance [joueur]
  pay:
    description: Envoyer des pièces
    usage: /pay <joueur> <montant>
  shop:
    description: Shop du serveur
    usage: /shop
  ah:
    description: Hôtel des ventes
    aliases: [auction, bazaar]
    usage: /ah [sell <prix>]
  givemoney:
    description: Donner de l'argent (admin)
    aliases: [addmoney, eco-give]
    usage: /givemoney <joueur> <montant>
    permission: astraland.admin
    default: op

permissions:
  astraland.admin:
    description: Accès aux commandes admin
    default: op
