name: AstraLand-OneBlock
version: 1.0.0-SNAPSHOT
main: com.astraland.oneblock.OneBlock
api-version: "1.21"
description: AstraLand - Module OneBlock
authors: [AstraLand]

commands:
  oneblock:
    description: Commandes OneBlock
    aliases: [ob, one]
    usage: /oneblock [create|home|sethome|info|phase|top|invite|kick|accept|decline|leave|delete|warp|setwarp|membres|upgrades|defis|warps|settings|help]
  obadmin:
    description: Commandes admin OneBlock
    aliases: [oneblockadmin]
    usage: /obadmin [info|tp|setblocks|reset|give|list|reload]
    permission: astraland.admin
    permission-message: "&cTu n'as pas la permission."
    default: op
  balance:
    description: Voir son solde de pièces
    aliases: [bal, money, coins]
    usage: /balance [joueur]
  pay:
    description: Envoyer des pièces à un joueur
    usage: /pay <joueur> <montant>
  shop:
    description: Ouvre le shop du mode de jeu
    usage: /shop
  ah:
    description: Hôtel des ventes
    aliases: [auction, bazaar]
    usage: /ah [sell <prix>]
  givemoney:
    description: Donner de l'argent à un joueur (admin)
    aliases: [addmoney, eco-give]
    usage: /givemoney <joueur> <montant>
    permission: astraland.admin
    permission-message: "&cTu n'as pas la permission d'utiliser cette commande."
    default: op

permissions:
  astraland.admin:
    description: Accès aux commandes admin OneBlock
    default: op
