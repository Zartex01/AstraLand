name: AstraLand-UHC
version: 1.0.0-SNAPSHOT
main: com.astraland.uhc.UHC
api-version: "1.21"
description: AstraLand - Module UHC
authors: [AstraLand]

commands:
  uhc:
    description: Commandes UHC
    usage: /uhc <start|stop|join|leave|list|setworld|scenario>
  balance:
    description: Voir son solde de pièces
    aliases: [bal, money]
    usage: /balance [joueur]
  pay:
    description: Envoyer des pièces à un joueur
    usage: /pay <joueur> <montant>
  shop:
    description: Ouvre le shop du mode de jeu
    usage: /shop
  ah:
    description: Hôtel des ventes
    aliases: [auction, bazaar]
    usage: /ah [sell <prix>]
