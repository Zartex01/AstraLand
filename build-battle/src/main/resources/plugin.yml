name: AstraLand-BuildBattle
version: 1.0.0-SNAPSHOT
main: com.astraland.buildbattle.BuildBattle
api-version: "1.21"
description: AstraLand - Module Build Battle
authors: [AstraLand]

commands:
  buildbattle:
    description: Commandes Build Battle
    aliases: [bb]
    usage: /buildbattle <join|leave|list|vote|create|setspawn|start>
  balance:
    description: Voir son solde de pièces
    aliases: [bal, money]
    usage: /balance [joueur]
  pay:
    description: Envoyer des pièces à un joueur
    usage: /pay <joueur> <montant>
  shop:
    description: Ouvre le shop du mode de jeu
    usage: /shop
  ah:
    description: Hôtel des ventes
    aliases: [auction, bazaar]
    usage: /ah [sell <prix>]
