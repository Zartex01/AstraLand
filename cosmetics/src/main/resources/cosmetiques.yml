    slot: 11
    permission: ""
    commande-joueur: ""
    commande-console: ""

  exemple-ailes:
    nom: "&f&l☁ Ailes d'Ange"
    description:
      - "&7De majestueuses ailes blanches."
      - ""
      - "&aCliquez pour équiper"
    item: FEATHER
    enchante: true
    slot: 12
    permission: ""
    commande-joueur: ""
    commande-console: ""

  exemple-trail:
    nom: "&b&l~ Traînée Aquatique"
    description:
      - "&7Laisse une traînée d'eau derrière toi."
      - ""
      - "&aCliquez pour équiper"
    item: WATER_BUCKET
    enchante: false
    slot: 13
    permission: ""
    commande-joueur: ""
    commande-console: ""

  exemple-premium:
    nom: "&6&l★ Pack Premium"
