# ============================================================
#   AstraLand - Cosmétiques
# ============================================================
# Ajoute tes cosmétiques ici. Chaque clé est un identifiant unique.
#
# Champs disponibles :
#   nom         : Nom affiché dans le GUI (codes couleur avec &)
#   description : Liste de lignes de lore (codes couleur avec &)
#   item        : Matériau Minecraft (ex: FEATHER, RED_WOOL, DIAMOND...)
#   enchante    : true pour ajouter l'effet enchanté sur l'item (optionnel)
#   slot        : Slot dans le GUI (0-53). Laisser vide = placement automatique
#   permission  : Permission requise pour voir/utiliser ce cosmétique (vide = tout le monde)
#   commande-joueur  : Commande exécutée par le joueur au clic (sans /)
#   commande-console : Commande exécutée par la console ({joueur} = pseudo du joueur)
# ============================================================

cosmetiques:

  exemple-particules:
    nom: "&d&l✦ Particules Magiques"
    description:
      - "&7Des particules magiques apparaissent"
      - "&7autour de toi en permanence."
      - ""
      - "&ePermission : &fastraland.cosmetique.particules"
      - ""
      - "&aCliquez pour équiper"
    item: BLAZE_POWDER
    enchante: false
    slot: 10
    permission: ""
    commande-joueur: ""
    commande-console: ""

  exemple-chapeau:
