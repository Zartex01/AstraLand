      - "&7Accès à tous les cosmétiques"
      - "&7exclusifs du rang Premium."
      - ""
      - "&eRequiert : &6Rang Premium"
      - ""
      - "&aCliquez pour équiper"
    item: NETHER_STAR
    enchante: true
    slot: 14
